<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Chrono UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700&display=swap"
    rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>

<body
  class="relative flex flex-col w-screen h-screen items-center justify-center m-0 bg-slate-950 font-inter overflow-hidden">

  <!-- Animated Background Elements -->
  <div
    class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-900/20 blur-[120px] mix-blend-screen pointer-events-none">
  </div>
  <div
    class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-rose-900/20 blur-[100px] mix-blend-screen pointer-events-none">
  </div>

  <div class="z-10 flex flex-col items-center gap-12 text-center">

    <div class="space-y-4">
      <h1
        class="text-6xl md:text-8xl font-outfit font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-rose-400 drop-shadow-lg">
        Chrono UI
      </h1>
      <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide max-w-md mx-auto">
        Experience time precisely engineered.
      </p>
    </div>

    <nav class="w-full max-w-3xl px-6">
      <ul class="flex flex-col md:flex-row justify-center gap-6 md:gap-10 w-full">
        <li class="w-full md:w-1/2 group">
          <a href="analog.html" class="block w-full h-full">
            <div
              class="glass-panel p-8 md:p-12 rounded-3xl flex flex-col items-center justify-center transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(0,150,255,0.15)] hover:border-blue-500/30 group-hover:bg-slate-900/60 relative overflow-hidden">
              <div
                class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
              </div>
              <div
                class="w-20 h-20 mb-6 rounded-full border-[3px] border-slate-600 flex items-center justify-center group-hover:border-blue-400 transition-colors duration-500 relative">
                <div
                  class="w-1 h-8 bg-blue-400 absolute top-2 rounded-full origin-bottom rotate-45 group-hover:rotate-[135deg] transition-transform duration-1000">
                </div>
                <div
                  class="w-8 h-1 bg-slate-400 absolute left-8 rounded-full pointer-events-none group-hover:bg-rose-400 transition-colors duration-500">
                </div>
                <div class="w-2 h-2 bg-white rounded-full z-10"></div>
              </div>
              <h2 class="text-3xl font-outfit font-semibold text-slate-100 group-hover:text-white transition-colors">
                Analog</h2>
              <p class="text-slate-500 mt-2 font-light text-sm">Classic sweeping hands</p>
            </div>
          </a>
        </li>
        <li class="w-full md:w-1/2 group">
          <a href="digital.html" class="block w-full h-full">
            <div
              class="glass-panel p-8 md:p-12 rounded-3xl flex flex-col items-center justify-center transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(255,0,60,0.15)] hover:border-rose-500/30 group-hover:bg-slate-900/60 relative overflow-hidden">
              <div
                class="absolute inset-0 bg-gradient-to-br from-rose-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
              </div>
              <div class="h-20 mb-6 flex items-center justify-center">
                <div
                  class="text-4xl font-bold font-mono tracking-widest text-slate-600 group-hover:text-rose-500 group-hover:neon-text-red transition-all duration-500">
                  12:00
                </div>
              </div>
              <h2 class="text-3xl font-outfit font-semibold text-slate-100 group-hover:text-white transition-colors">
                Digital</h2>
              <p class="text-slate-500 mt-2 font-light text-sm">Precision neon matrix</p>
            </div>
          </a>
        </li>
      </ul>
    </nav>

  </div>
</body>

</html>
