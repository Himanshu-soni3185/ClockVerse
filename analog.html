<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* CSS needed for precise transformations since tailwind arbitary values can be tricky dynamically */
    .origin-center-left {
      transform-origin: 0% 50%;
    }
  </style>
</head>

<body
  class="bg-slate-900 flex flex-col items-center justify-center font-outfit h-screen w-screen overflow-hidden m-0 relative">
  <!-- Background Glow -->
  <div
    class="absolute w-[60vmin] h-[60vmin] rounded-full bg-blue-500/10 blur-[100px] pointer-events-none mix-blend-screen z-0">
  </div>

  <!-- Back Button -->
  <a href="index.html"
    class="absolute top-8 left-8 text-slate-400 hover:text-white flex items-center gap-2 transition-colors duration-300 font-inter text-sm tracking-widest uppercase z-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Back
  </a>

  <div class="z-10 flex flex-col items-center">
    <h1
      class="text-xl text-blue-400 font-semibold tracking-[0.3em] uppercase mb-12 drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]">
      Analog Chronograph</h1>

    <!-- Outer Bezel -->
    <div
      class="bg-slate-800 h-[70vmin] w-[70vmin] max-h-[500px] max-w-[500px] rounded-full p-4 analog-shadow flex justify-center items-center backdrop-blur-md relative border border-slate-700/50">

      <!-- Inner Watch Face -->
      <div
        class="w-full h-full rounded-full bg-slate-950 relative flex justify-center items-center analog-inner border border-white/5">

        <!-- Classic ticks -->
        <div class="absolute inset-0">
          <!-- Top/Bottom/Left/Right Ticks -->
          <div
            class="absolute top-4 left-1/2 -translate-x-1/2 w-1.5 h-6 bg-blue-400/80 rounded-full shadow-[0_0_10px_rgba(96,165,250,0.5)]">
          </div>
          <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-1.5 h-6 bg-white/40 rounded-full"></div>
          <div class="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-1.5 bg-white/40 rounded-full"></div>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-1.5 bg-white/40 rounded-full"></div>
        </div>

        <!-- Hands Container (using absolute centering to make rotation origin simple) -->
        <div class="absolute top-1/2 left-1/2 w-0 h-0">

          <!-- Hour Hand -->
          <div
            class="absolute bg-white/90 rounded-full h-hands z-20 origin-center-left shadow-lg
                          w-[22vmin] max-w-[150px] h-[6px] -mt-[3px] 
                          before:content-[''] before:absolute before:left-[-15px] before:w-[30px] before:h-full before:bg-white/90 before:rounded-full">
          </div>

          <!-- Minute Hand -->
          <div
            class="absolute bg-blue-400 rounded-full m-hands z-30 origin-center-left shadow-[0_0_10px_rgba(96,165,250,0.4)]
                          w-[30vmin] max-w-[200px] h-[4px] -mt-[2px]
                          before:content-[''] before:absolute before:left-[-20px] before:w-[40px] before:h-full before:bg-blue-400 before:rounded-full">
          </div>

          <!-- Second Hand -->
          <div
            class="absolute bg-rose-500 rounded-r-full s-hands z-40 origin-center-left shadow-lg
                          w-[33vmin] max-w-[220px] h-[2px] -mt-[1px]
                          before:content-[''] before:absolute before:left-[-30px] before:w-[60px] before:h-full before:bg-rose-500 before:rounded-l-full">
          </div>
        </div>

        <!-- Center Axis / Pin -->
        <div
          class="absolute bg-blue-400 w-4 h-4 rounded-full border-2 border-slate-900 axis z-50 shadow-[0_0_15px_rgba(96,165,250,0.8)] flex items-center justify-center">
          <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="src/js/start.js"></script>
</body>

</html>
